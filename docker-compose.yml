version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-pitch-evaluator:latest
    container_name: ai_pitch_evaluator_web
    ports:
      - "8502:8501"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-offline}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    restart: unless-stopped
